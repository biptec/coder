name: build-custom-image

on:
  push:
    branches:
      - main

  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      tag:
        description: "Optional extra image tag, for example: dev-001"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up mise tools
        uses: ./.github/actions/setup-mise
        with:
          install-args: "go node pnpm protoc"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -Eeuo pipefail

          repository="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(git rev-parse --short=12 HEAD)"

          force_version=""

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            force_version="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" =~ ^build/(v?[0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            force_version="${BASH_REMATCH[1]}"
          fi

          force_version="${force_version#v}"

          if [[ -n "${force_version}" ]]; then
            version="$(CODER_FORCE_VERSION="${force_version}" ./scripts/version.sh)"
          else
            version="$(./scripts/version.sh)"
          fi

          {
            echo "repository=${repository}"
            echo "short_sha=${short_sha}"
            echo "version=${version}"
            echo "sha_tag=${repository}:sha-${short_sha}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "CODER_IMAGE_BASE=${repository}"
            echo "CODER_FORCE_VERSION=${version}"
          } >> "${GITHUB_ENV}"

          echo "Image repository: ${repository}"
          echo "Version: ${version}"
          echo "Primary tag: ${repository}:sha-${short_sha}"

      - name: Build Coder binaries
        shell: bash
        run: |
          set -Eeuo pipefail

          ./.github/scripts/retry.sh -- go mod download
          make gen/mark-fresh

          make \
            "build/coder_${{ steps.meta.outputs.version }}_linux_amd64" \
            "build/coder_${{ steps.meta.outputs.version }}_linux_arm64"

          cp "build/coder_${{ steps.meta.outputs.version }}_linux_amd64" build/coder-linux-amd64
          cp "build/coder_${{ steps.meta.outputs.version }}_linux_arm64" build/coder-linux-arm64

      - name: Build and push Docker image
        shell: bash
        run: |
          set -Eeuo pipefail

          ./scripts/build_docker.sh \
            --arch amd64 \
            --target "${{ steps.meta.outputs.sha_tag }}-amd64" \
            --version "${{ steps.meta.outputs.version }}" \
            --push \
            build/coder-linux-amd64

          ./scripts/build_docker.sh \
            --arch arm64 \
            --target "${{ steps.meta.outputs.sha_tag }}-arm64" \
            --version "${{ steps.meta.outputs.version }}" \
            --push \
            build/coder-linux-arm64

      - name: Create multi-arch image
        shell: bash
        run: |
          set -Eeuo pipefail

          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.sha_tag }}" \
            "${{ steps.meta.outputs.sha_tag }}-amd64" \
            "${{ steps.meta.outputs.sha_tag }}-arm64"

      - name: Add main tag
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -Eeuo pipefail

          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.repository }}:main" \
            "${{ steps.meta.outputs.sha_tag }}"

      - name: Add release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -Eeuo pipefail

          release_tag="${{ github.event.release.tag_name }}"
          safe_tag="$(printf '%s' "${release_tag}" | tr -c 'A-Za-z0-9_.-' '-')"

          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.repository }}:${safe_tag}" \
            "${{ steps.meta.outputs.sha_tag }}-amd64" \
            "${{ steps.meta.outputs.sha_tag }}-arm64"

      - name: Add manual extra tag
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        shell: bash
        run: |
          set -Eeuo pipefail

          safe_tag="$(printf '%s' "${{ inputs.tag }}" | tr -c 'A-Za-z0-9_.-' '-')"

          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.repository }}:${safe_tag}" \
            "${{ steps.meta.outputs.sha_tag }}-amd64" \
            "${{ steps.meta.outputs.sha_tag }}-arm64"

      - name: Print deploy image
        shell: bash
        run: |
          set -Eeuo pipefail

          cat <<EOF
          Pushed image:

            ${{ steps.meta.outputs.sha_tag }}

          For dev-infra use:

            image.repository = ${{ steps.meta.outputs.repository }}
            image.tag        = sha-${{ steps.meta.outputs.short_sha }}

          Release tag:

            ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

          Manual extra tag:

            ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
          EOF
